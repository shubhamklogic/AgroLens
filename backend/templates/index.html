<!DOCTYPE html>
<html>
<head>
    <title>AgroLens Prototype</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f4f4; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #recommendBtn {
            background:#007bff;
            margin-top:10px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AgroLens: Backend Prototype</h2>
    <p><small>Testing Weather API + Soil Inference Engine</small></p>

    <label>Latitude:</label>
    <input type="number" id="lat" placeholder="e.g. 26.82">

    <label>Longitude:</label>
    <input type="number" id="lon" placeholder="e.g. 75.64">

    <label>Check Weather (for testing API):</label>
    <button onclick="fetchWeather()" style="background:#ff9800">
    Fetch Weather Data
    </button>
    <div id="weatherBox" style="margin-top:10px;display:none;background:#eef;padding:10px;">
    <p id="weatherText"></p>
    </div>

    <label>Soil pH (0.0 - 14.0):</label>
    <input type="number" id="ph" step="0.1" placeholder="e.g. 6.5">

    <label>Soil Type:</label>
    <select id="soil_type">
        <option value="1">Sandy</option>
        <option value="2">Loamy</option>
        <option value="3">Clayey</option>
    </select>

    <!-- Crop selector only used for prediction -->
    <div id="cropSection">
        <label>Select Crop (for yield prediction):</label>
        <select id="crop">
            <option value="Rice">Rice</option>
            <option value="Wheat">Wheat</option>
            <option value="Maize">Maize</option>
            <option value="Sugarcane">Sugarcane</option>
            <option value="Millets">Millets</option>
        </select>
    </div>

    <button onclick="predictCrop()">Predict Yield for Selected Crop</button>

    <button id="recommendBtn" onclick="recommendCrop()">
        Recommend Best Crop
    </button>

    <div id="result">
        <h4 id="resultTitle">Result</h4>
        <p id="predictionText"></p>
        <p id="advisoryText" style="color: blue; font-style: italic;"></p>
    </div>

</div>

<script>

function validateInputs(){
    const lat = document.getElementById('lat').value;
    const lon = document.getElementById('lon').value;
    const ph = document.getElementById('ph').value;

    if(!lat || !lon || !ph){
        alert("Please fill Latitude, Longitude and Soil pH");
        return false;
    }

    return true;
}


async function predictCrop() {

    if(!validateInputs()) return;

    // show crop selector again if hidden
    document.getElementById('cropSection').style.display = "block";

    const data = {
        lat: document.getElementById('lat').value,
        lon: document.getElementById('lon').value,
        soil_ph: document.getElementById('ph').value,
        soil_type: document.getElementById('soil_type').value,
        crop: document.getElementById('crop').value
    };

    const response = await fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById('result').style.display = 'block';

    document.getElementById('resultTitle').innerText = "Prediction Result";

    document.getElementById('predictionText').innerText =
        `Crop: ${result.crop} | Predicted Yield: ${result.prediction}`;

    document.getElementById('advisoryText').innerText =
        `Advisory: ${result.advisory}`;
}


async function recommendCrop() {

    if(!validateInputs()) return;

    // hide crop selector because system decides crop
    document.getElementById('cropSection').style.display = "none";

    const data = {
        lat: document.getElementById('lat').value,
        lon: document.getElementById('lon').value,
        soil_ph: document.getElementById('ph').value,
        soil_type: document.getElementById('soil_type').value
    };

    const response = await fetch('/recommend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById('result').style.display = 'block';

    document.getElementById('resultTitle').innerText = "AI Recommendation";

    document.getElementById('predictionText').innerText =
        `Recommended Crop: ${result.recommended_crop} | Expected Yield: ${result.expected_yield}`;

    document.getElementById('advisoryText').innerText =
        `Advisory: ${result.advisory}`;
}


async function fetchWeather(){

    const lat = document.getElementById('lat').value;
    const lon = document.getElementById('lon').value;

    if(!lat || !lon){
        alert("Enter latitude and longitude first");
        return;
    }

    const response = await fetch(`/weather?lat=${lat}&lon=${lon}`);
    const result = await response.json();

    document.getElementById('weatherBox').style.display = "block";

    if(result.status === "success"){

        const data = result.data;

        document.getElementById('weatherText').innerText =
        `Temperature: ${data.avg_temp} °C | Rainfall: ${data.total_rain} mm | Humidity: ${data.humidity}%`;

    }else{

        document.getElementById('weatherText').innerText =
        "Weather API failed to fetch data.";

    }
}




</script>

</body>
</html>
