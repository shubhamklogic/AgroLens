<!DOCTYPE html>
<html>
<head>
    <title>AgroLens Prototype</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f4f4; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #recommendBtn {
            background:#007bff;
            margin-top:10px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AgroLens: Backend Prototype</h2>
    <p><small>Testing Weather API + Soil Inference Engine</small></p>

    <label>Latitude:</label>
    <input type="number" id="lat" placeholder="e.g. 26.82">

    <label>Longitude:</label>
    <input type="number" id="lon" placeholder="e.g. 75.64">

    <label>Check Weather (for testing API):</label>
    <button onclick="fetchWeather()" style="background:#ff9800">
    Fetch Weather Data
    </button>

    <div id="weatherBox" style="margin-top:10px;display:none;background:#eef;padding:10px;">
        <p id="weatherText"></p>
    </div>

    <label>Soil pH (0.0 - 14.0):</label>
    <input type="number" id="ph" step="0.1" placeholder="e.g. 6.5">

    <label>Soil Type:</label>
    <select id="soil_type">
        <option value="1">Sandy</option>
        <option value="2">Loamy</option>
        <option value="3">Clayey</option>
    </select>

    <div id="cropSection">
        <label>Select Crop (for yield prediction):</label>
        <select id="crop">
            <option value="Rice">Rice</option>
            <option value="Wheat">Wheat</option>
            <option value="Maize">Maize</option>
            <option value="Sugarcane">Sugarcane</option>
            <option value="Millets">Millets</option>
        </select>
    </div>

    <button onclick="predictCrop()">Predict Yield for Selected Crop</button>

    <button id="recommendBtn" onclick="recommendCrop()">
        Recommend Best Crop
    </button>

    <div id="result">
        <h4 id="resultTitle">Result</h4>
        <p id="predictionText"></p>
        <p id="advisoryText" style="color: blue; font-style: italic;"></p>
    </div>

    <!-- Transparency Table -->
    <div id="transparencyBox" style="margin-top:20px;display:none;background:#f9f9f9;padding:15px;border-radius:5px;">

        <h4>Decision Transparency</h4>

        <table border="1" width="100%" style="border-collapse:collapse;text-align:center">

            <tr>
                <th>Factor</th>
                <th>Value</th>
            </tr>

            <tr>
                <td>Temperature</td>
                <td id="tempVal"></td>
            </tr>

            <tr>
                <td>Rainfall</td>
                <td id="rainVal"></td>
            </tr>

            <tr>
                <td>Humidity</td>
                <td id="humVal"></td>
            </tr>

            <tr>
                <td>Soil pH</td>
                <td id="phVal"></td>
            </tr>

            <tr>
                <td>Soil Type</td>
                <td id="soilVal"></td>
            </tr>

        </table>

        <h4>AI Decision Reasons</h4>
        <ul id="reasonList"></ul>

    </div>

</div>

<script>

function validateInputs(){
    const lat = document.getElementById('lat').value;
    const lon = document.getElementById('lon').value;
    const ph = document.getElementById('ph').value;

    if(!lat || !lon || !ph){
        alert("Please fill Latitude, Longitude and Soil pH");
        return false;
    }

    return true;
}


async function predictCrop() {

    if(!validateInputs()) return;

    document.getElementById('cropSection').style.display = "block";

    const data = {
        lat: document.getElementById('lat').value,
        lon: document.getElementById('lon').value,
        soil_ph: document.getElementById('ph').value,
        soil_type: document.getElementById('soil_type').value,
        crop: document.getElementById('crop').value
    };

    const response = await fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById('result').style.display = 'block';

    document.getElementById('resultTitle').innerText = "Prediction Result";

    document.getElementById('predictionText').innerText =
        `Crop: ${result.crop} | Predicted Yield: ${result.prediction}`;

    document.getElementById('advisoryText').innerText =
        `Advisory: ${result.advisory}`;

    // Hide transparency for normal prediction
    document.getElementById('transparencyBox').style.display = "none";
}


async function recommendCrop() {

    if(!validateInputs()) return;

    document.getElementById('cropSection').style.display = "none";

    const data = {
        lat: document.getElementById('lat').value,
        lon: document.getElementById('lon').value,
        soil_ph: document.getElementById('ph').value,
        soil_type: document.getElementById('soil_type').value
    };

    const response = await fetch('/recommend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById('result').style.display = 'block';

    document.getElementById('resultTitle').innerText = "AI Recommendation";

    document.getElementById('predictionText').innerText =
        `Recommended Crop: ${result.recommended_crop === "None" ? "No suitable crop" : result.recommended_crop}`

    document.getElementById('advisoryText').innerText =
        `Advisory: ${result.advisory}`;

    document.getElementById('transparencyBox').style.display = "block";

    document.getElementById('tempVal').innerText = result.environment.temp + " °C";
    document.getElementById('rainVal').innerText = result.environment.rain + " mm";
    document.getElementById('humVal').innerText = result.environment.humidity + " %";
    document.getElementById('phVal').innerText = document.getElementById('ph').value;

    const soilMap = {1:"Sandy",2:"Loamy",3:"Clayey"};

    document.getElementById('soilVal').innerText =
        soilMap[document.getElementById('soil_type').value];

    const reasons = result.decision_factors;

    const list = document.getElementById('reasonList');
    list.innerHTML = "";

    reasons.forEach(r=>{
        const li = document.createElement("li");
        li.innerText = r;
        list.appendChild(li);
    });
}


async function fetchWeather(){

    const lat = document.getElementById('lat').value;
    const lon = document.getElementById('lon').value;

    if(!lat || !lon){
        alert("Enter latitude and longitude first");
        return;
    }

    const response = await fetch(`/weather?lat=${lat}&lon=${lon}`);
    const result = await response.json();

    document.getElementById('weatherBox').style.display = "block";

    if(result.status === "success"){

        const data = result.data;

        document.getElementById('weatherText').innerText =
        `Temperature: ${data.avg_temp.toFixed(2)} °C | Rainfall: ${data.total_rain.toFixed(2)} mm | Humidity: ${data.humidity.toFixed(2)}%`;

    }else{

        document.getElementById('weatherText').innerText =
        "Weather API failed to fetch data.";

    }
}

</script>

</body>
</html>
